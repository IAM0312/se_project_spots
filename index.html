<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple, interactive social media web app where users can upload or delete photos, like others’ photos,
      and make small profile edits."
    />
    <meta name="keywords" content="social, share." />
    <meta name="author" content="Pierre Marie Roger" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/logo.svg" alt="Spot logo" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            src="./images/avatar.jpg"
            alt="user's avatar"
            class="profile__avatar"
          />
          <div class="profile__column">
            <h1 class="profile__name">Bessie Coleman</h1>
            <p class="profile__description">Civil Aviator</p>
            <button type="button" class="profile__edit-btn">
              Edit Profile
            </button>
          </div>
          <button type="button" class="profile__add-btn">New Post</button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <button type="button" class="card__delete-btn"></button>
                <img src="#" alt="Card image placeholder" class="card__image" />
                <div class="card__content">
                  <h2 class="card__title"></h2>
                  <button type="button" class="card__like-btn"></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">2025 © Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <h2 class="modal__title">Edit profile</h2>
          <button type="button" class="modal__exit-btn"></button>
          <form class="modal__form">
            <label for="input-name" class="modal__label"
              >Name
              <input
                type="text"
                class="modal__input"
                id="input-name"
                placeholder="Type your name"
                minlength="2"
                maxlength="40"
                required
              />
              <span id="input-name-error" class="modal__error"></span>
            </label>
            <label for="input-description" class="modal__label"
              >Description
              <input
                type="text"
                class="modal__input"
                id="input-description"
                placeholder="Describe yourself"
                minlength="2"
                maxlength="200"
                required
              />
              <span id="input-description-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__save-btn">Save</button>
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <h2 class="modal__title">New post</h2>
          <button type="button" class="modal__exit-btn"></button>
          <form class="modal__form">
            <label for="input-link" class="modal__label"
              >Image link
              <input
                type="url"
                class="modal__input"
                id="input-link"
                placeholder="Paste a link to the picture"
                required
              />
              <span id="input-link-error" class="modal__error"></span>
            </label>
            <label for="input-caption" class="modal__label"
              >Caption
              <input
                type="text"
                class="modal__input"
                id="input-caption"
                placeholder="Type your caption"
                minlength="2"
                maxlength="200"
                required
              />
              <span id="input-caption-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__save-btn">Save</button>
          </form>
        </div>
      </div>

      <div class="modal modal__type_preview" id="preview-image-modal">
        <div class="modal__preview">
          <button
            type="button"
            class="modal__exit-btn modal__exit-btn_preview"
          ></button>
          <img src="#" alt="Image preview" class="modal__image" />
          <p class="modal__caption"></p>
        </div>
      </div>
    </div>
    <script src="./scripts/validation.js"></script>
    <script src="./scripts/index.js"></script>
  </body>
</html>
